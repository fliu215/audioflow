---
clip_duration: 10.

train_jsonls:
  - path: "./jsonls/mss/train/musdb18hq.jsonl" 
    weight: 1.0
  - path: "./jsonls/mss/train/musdb18hq.jsonl"
    weight: 1.0

validate_train_jsonl:
    path: "./jsonls/mss/train/musdb18hq.jsonl"
    num: 10

validate_test_jsonl:
    path: "./jsonls/mss/test/musdb18hq.jsonl"
    num: 10

sampler: 
    name: BatchJsonlSampler

dataset: 
    name: MSSDataset

# latent:
#     name: "levo_vae"
#     in_dim: &in_dim 64

base:
    name: Transformer
    in_dim: &in_dim 64
    dim: &dim 768
    num_layers: 12
    num_heads: 24
    rope_len: 8192

adapter:
    name: MSSAdapter
    in_dim: *in_dim
    dim: *dim

train:
    device: cuda
    num_workers: 16
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 8
    test_every_n_steps: 10000
    save_every_n_steps: 100000
    training_steps: 2000000
    resume_ckpt_path:  # Leave blank if train from scratch