---
clip_duration: 10.

train_datasets:
    MUSDB18HqLowres2HighresVAE:
        root: "./datasets/musdb18hq_8k_44k_vae"
        split: "train"

test_datasets:
    MUSDB18HqLowres2HighresVAE:
        root: "./datasets/musdb18hq_8k_44k_vae"
        split: "test"
        
sampler: RepeatShuffleSampler

data_transform: 
    name: SuperResolutionVAE

base:
    name: Transformer1D
    in_dim: 64
    patch_size: 1
    dim: 768
    num_layers: 12
    num_heads: 12
    rope_len: 8192

adaptor:
    name: LatentEncoder
    dim: 64

train:
    device: cuda
    num_workers: 0
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 16
    test_every_n_steps: 10000
    save_every_n_steps: 50000
    training_steps: 500000
    resume_ckpt_path:  # Leave blank if train from scratch

valid_audios: 10