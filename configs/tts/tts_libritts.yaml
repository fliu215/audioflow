validate_train_jsonl:
    path: "./jsonls/tts/train/libritts_train-clean-100.jsonl"
    num: 10

validate_test_jsonl:
    path: "./jsonls/tts/test/libritts_test-clean.jsonl"
    num: 10

sampler: 
    name: BatchJsonlSampler

dataset: 
    name: MetaDataset

base:
    name: Transformer
    in_dim: 64
    dim: &dim 768
    num_layers: 12
    num_heads: 24
    rope_len: 8192

adapter:
    name: Adapter
    dim: *dim
    max_length: 1000

train:
    device: cuda
    num_workers: 16
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 8
    test_every_n_steps: 10000
    save_every_n_steps: 100000
    training_steps: 2000000
    resume_ckpt_path:  # Leave blank if train from scratch