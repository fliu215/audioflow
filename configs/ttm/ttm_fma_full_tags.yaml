---
clip_duration: 10.

train_jsonls:
  - path: "./jsonls/ttm/train/fma_tags_small.jsonl" 
    weight: 3660.
  - path: "./jsonls/ttm/train/fma_tags_medium.jsonl"
    weight: 9247.
  - path: "./jsonls/ttm/train/fma_tags_large.jsonl"
    weight: 19406.

validate_train_jsonl:
    path: "./jsonls/ttm/train/fma_tags_small.jsonl"
    num: 10

validate_test_jsonl:
    path: "./jsonls/ttm/test/fma_tags_small.jsonl"
    num: 10

sampler: 
    name: BatchJsonlSampler

dataset: 
    name: TTMDataset

base:
    name: Transformer
    in_dim: 64
    dim: &dim 768
    num_layers: 12
    num_heads: 24
    rope_len: 8192

adapter:
    name: TTMAdapter
    dim: *dim

train:
    device: cuda
    num_workers: 16
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 8
    test_every_n_steps: 10000
    save_every_n_steps: 100000
    training_steps: 2000000
    resume_ckpt_path:  # Leave blank if train from scratch