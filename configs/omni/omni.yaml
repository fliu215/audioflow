---
clip_duration: 10.

train_jsonls:
  - path: "./jsonls/dac2stereo/train/musdb18hq.jsonl"
    weight: 1.0
  - path: "./jsonls/mono2stereo/train/musdb18hq.jsonl"
    weight: 1.0
  - path: "./jsonls/mixture2vocals/train/musdb18hq.jsonl"
    weight: 1.0
  - path: "./jsonls/superresolution/train/musdb18hq.jsonl"
    weight: 1.0
  - path: "./jsonls/tta/train/audiocaps2.0.jsonl"
    weight: 1.0
  - path: "./jsonls/tta/train/clotho2.1.jsonl"
    weight: 1.0
  - path: "./jsonls/ttm/train/gtzan.jsonl"
    weight: 1.0
  - path: "./jsonls/tts/train/libritts_train-clean-100.jsonl"
    weight: 1.0
  - path: "./jsonls/tts/train/libritts_train-clean-360.jsonl"
    weight: 1.0
  - path: "./jsonls/tts/train/libritts_train-other-500.jsonl"
    weight: 1.0
  - path: "./jsonls/vocals2mixture/train/musdb18hq.jsonl"
    weight: 1.0

validate_train_jsonl:
    path: "./jsonls/tts/train/libritts_train-clean-100.jsonl"
    num: 10

validate_test_jsonl:
    path: "./jsonls/tts/train/libritts_test-clean.jsonl"
    num: 10

sampler: 
    name: JsonlSampler

dataset: 
    name: MetaDataset

base:
    name: Transformer
    in_dim: 64
    dim: &dim 768
    num_layers: 12
    num_heads: 24
    rope_len: 8192

adapter:
    name: Adapter
    dim: *dim
    max_length: 1000

train:
    device: cuda
    num_workers: 0
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 16
    test_every_n_steps: 10000
    save_every_n_steps: 50000
    training_steps: 500000
    resume_ckpt_path:  # Leave blank if train from scratch