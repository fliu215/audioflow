---
clip_duration: 2.
fps: 25

train_jsonls:
  - path: "./jsonls/mss/mix2vocals.jsonl" 
    weight: 1.0
  - path: "./jsonls/mss/mix2vocals.jsonl"
    weight: 1.0

validate_train_jsonl:
    path: "./jsonls/mss/mix2vocals.jsonl"
    num: 10

validate_test_jsonl:
    path: "./jsonls/mss/mix2vocals.jsonl"
    num: 10

sampler: 
    name: JsonlSampler

dataset: 
    name: MetaDataset


base:
    name: Transformer
    in_dim: 64
    patch_size: 1
    dim: &dim 768
    num_layers: 12
    num_heads: 12
    rope_len: 8192

adaptor:
    name: Adaptor
    dim: *dim
    

train:
    device: cuda
    # num_workers: 16
    num_workers: 0
    precision: "no"  # "no" (fp32) | "bf16"
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 16
    test_every_n_steps: 10000
    save_every_n_steps: 50000
    training_steps: 500000
    resume_ckpt_path:  # Leave blank if train from scratch

valid_audios: 10